---
- name: Create VM in vCenter
  hosts: localhost
  gather_facts: no

  vars:
    # vCenter details
    vcenter_host: "172.16.10.150"
    vcenter_user: "administrator@vsphere.local"
    vcenter_pass: "Victory@2015"

    # VM details
    vm_name: "test-vm"
    clusters: "ESXI-Cluster"
    Datastore: "store(1)"
    Templates: "ubuntu-template"

    # Hardware
    ram: 2048
    cpu: 2
    disk: 20

    # Network
    vm_network: "VM Network"

    # Metadata
    owner_primary: "admin"
    owner_secondary: "admin2"
    owner_business: "business"

    # OS / config
    os_type: "rhel"
    domain_name: "shaik.com"
    domain_user: "admin@shaik.com"
    enable_admin: "yes"
    sudo_users: "user1,user2"

  tasks:

    - name: Create VM
      community.vmware.vmware_guest:
        hostname: "{{ vcenter_host }}"
        username: "{{ vcenter_user }}"
        password: "{{ vcenter_pass }}"
        validate_certs: no

        name: "{{ vm_name }}"
        cluster: "{{ clusters }}"
        datastore: "{{ Datastore }}"
        template: "{{ Templates }}"

        hardware:
          memory_mb: {{ ram }}
          num_cpus: {{ cpu }}

        disk:
          - size_gb: {{ disk }}
            type: thin

        networks:
          - name: "{{ vm_network }}"
            type: dhcp

        annotation: |
          Primary Owner: {{ owner_primary }}
          Secondary Owner: {{ owner_secondary }}
          Business Owner: {{ owner_business }}

        state: poweredon
      register: vm_output

    # -------------------------------
    # Wait for SSH (better approach)
    # -------------------------------
    - name: Wait for SSH
      wait_for:
        host: "{{ vm_name }}"
        port: 22
        timeout: 300

    - name: Add host to inventory
      add_host:
        name: "{{ vm_name }}"
        groups: provisioned

# =====================================================

- name: Configure Linux
  hosts: provisioned
  become: yes

  tasks:

    - name: Install RHEL packages
      when: os_type == "rhel"
      yum:
        name:
          - adcli
          - realmd
          - sssd
          - oddjob
          - oddjob-mkhomedir
          - samba-common-tools
          - krb5-workstation
          - authselect-compat
        state: present

    - name: Install Ubuntu packages
      when: os_type == "ubuntu"
      apt:
        name:
          - sssd-ad
          - sssd-tools
          - realmd
          - adcli
        update_cache: yes

    - name: Join domain
      command: realm join {{ domain_name }} -U "{{ domain_user }}"
      register: domain_join
      changed_when: "'already joined' not in domain_join.stdout"
      failed_when: domain_join.rc != 0 and
                   'already joined' not in domain_join.stdout

    - name: Create local user
      user:
        name: localadmin
        password: "{{ 'test@123' | password_hash('sha512') }}"
        shell: /bin/bash
        create_home: yes

    - name: Add local user to admin group
      user:
        name: localadmin
        groups: "{{ 'wheel' if os_type == 'rhel' else 'sudo' }}"
        append: yes

    - name: Set admin group
      set_fact:
        admin_group: "{{ 'wheel' if os_type == 'rhel' else 'sudo' }}"

    - name: Enable admin users
      when: enable_admin == "yes"
      user:
        name: "{{ item }}"
        groups: "{{ admin_group }}"
        append: yes
      loop: "{{ sudo_users.split(',') }}"
