---
# =====================================================
# Play 1: Create VM in vCenter
# =====================================================
- name: Create VM in vCenter
  hosts: localhost
  gather_facts: no
  vars:
    domain_name: "shaik.com"
    datacenter: "Datacenter 2"
    folder: "/Datacenter 2/vm"
    # AWX VMware vCenter credential injects these as environment variables
    vcenter_host: "{{ lookup('env', 'VMWARE_HOST') }}"
    vcenter_user: "{{ lookup('env', 'VMWARE_USER') }}"
    vcenter_pass: "{{ lookup('env', 'VMWARE_PASSWORD') }}"

  tasks:
    - name: Create VM
      community.vmware.vmware_guest:
        hostname: "{{ vcenter_host }}"
        username: "{{ vcenter_user }}"
        password: "{{ vcenter_pass }}"
        validate_certs: no
        datacenter: "{{ datacenter }}"
        name: "{{ vm_name }}"
        cluster: "{{ clusters }}"
        datastore: "{{ Datastore }}"
        template: "{{ Templates }}"
        folder: "{{ folder }}"
        hardware:
          memory_mb: "{{ ram | int }}"
          num_cpus: "{{ cpu | int }}"
        disk:
          - size_gb: "{{ disk | int }}"
            type: thin
        networks:
          - name: "{{ vm_network }}"
            type: dhcp
        annotation: |
          Primary Owner: {{ owner_primary }}
          Secondary Owner: {{ owner_secondary }}
          Business Owner: {{ owner_business }}
        state: poweredon
        wait_for_ip_address: yes
      register: vm_result

    - name: Wait for SSH to become available
      wait_for:
        host: "{{ vm_result.instance.ipv4 }}"
        port: 22
        timeout: 300
        delay: 10

    - name: Add VM to in-memory inventory
      add_host:
        name: "{{ vm_name }}"
        ansible_host: "{{ vm_result.instance.ipv4 }}"
        ansible_user: "{{ vm_ssh_user | default('root') }}"
        ansible_ssh_private_key_file: "{{ ssh_key_path | default(omit) }}"
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
        groups: provisioned

# =====================================================
# Play 2: Configure Linux
# =====================================================
- name: Configure Linux
  hosts: provisioned
  become: yes
  vars:
    domain_name: "shaik.com"

  tasks:
    # -------------------------------
    # Install packages
    # -------------------------------
    - name: Install RHEL packages
      when: os_type == "rhel"
      yum:
        name:
          - adcli
          - realmd
          - sssd
          - oddjob
          - oddjob-mkhomedir
          - samba-common-tools
          - krb5-workstation
          - authselect-compat
        state: present

    - name: Install Ubuntu packages
      when: os_type == "ubuntu"
      apt:
        name:
          - sssd-ad
          - sssd-tools
          - realmd
          - adcli
        update_cache: yes

    # -------------------------------
    # Join domain
    # -------------------------------
    - name: Join domain
      shell: echo "{{ domain_password }}" | realm join {{ domain_name }} -U "{{ domain_user }}" --stdin
      register: domain_join
      changed_when: "'already joined' not in domain_join.stderr"
      failed_when:
        - domain_join.rc != 0
        - "'already joined' not in domain_join.stderr"
      no_log: true

    # -------------------------------
    # Create local admin user
    # -------------------------------
    - name: Create local admin user
      user:
        name: localadmin
        password: "{{ local_admin_password | password_hash('sha512') }}"
        shell: /bin/bash
        create_home: yes

    - name: Add local user to admin group
      user:
        name: localadmin
        groups: "{{ 'wheel' if os_type == 'rhel' else 'sudo' }}"
        append: yes

    # -------------------------------
    # Admin users from AWX survey
    # -------------------------------
    - name: Set admin group based on OS
      set_fact:
        admin_group: "{{ 'wheel' if os_type == 'rhel' else 'sudo' }}"

    - name: Enable admin users from sudo_users list
      when: enable_admin == "yes"
      user:
        name: "{{ item }}"
        groups: "{{ admin_group }}"
        append: yes
      loop: "{{ sudo_users.split(',') | map('trim') | list }}"
